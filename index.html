<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sKynEt Tech | Solutions Logicielles</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #004a99; --accent: #e67e22; --dark: #0f172a; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            /* Retour à l'image avec la petite voiture */
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('BACKGROUD.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .main-card {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px 20px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .logo-container img {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
        }

        h1 { font-size: 2rem; margin-bottom: 10px; font-weight: 700; }
        p { font-size: 0.9rem; opacity: 0.9; margin-bottom: 30px; }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            color: var(--dark);
            padding: 18px 25px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .menu-item i {
            font-size: 1.4rem;
            margin-right: 15px;
            color: var(--primary);
        }

        .menu-item:hover {
            transform: translateY(-3px);
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .menu-item span { margin-left: auto; font-size: 0.8rem; color: #64748b; }

        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="logo-container">
        <img src="LOGOSKYNET.png" alt="sKynEt Tech Logo">
    </div>

    <h1>sKynEt Tech</h1>
    <p>Précision Technologique au service de votre Business</p>

    <div class="menu-grid">
        <a href="paie.html" class="menu-item">
            <i class="fas fa-file-invoice-dollar"></i>
            Gestion de Paie
            <span>Desktop</span>
        </a>

        <a href="colis.html" class="menu-item">
            <i class="fas fa-box-open"></i>
            Gestion de Colis
            <span>Android</span>
        </a>

        <a href="#" class="menu-item" style="opacity: 0.6; cursor: not-allowed;">
            <i class="fas fa-bus"></i>
            Gestion Transport
            <span>Bientôt</span>
        </a>
    </div>

    <footer>
        &copy; 2026 sKynEt Tech - Côte d'Ivoire
    </footer>
</div>

</body>
</html>
